# Choreo 配置文件
# 复制为 config.yaml 并按需修改
# 密钥（api_key 等）请用 $ENV_VAR 形式引用，实际值存 .env
#
# ── 思考内容（Thinking）说明 ──────────────────────────────────────────
#  DeepSeek：模型级别区分
#    deepseek-chat     → 无思考
#    deepseek-reasoner → 始终思考，返回 reasoning_content
#
#  Anthropic Claude：通过 thinking 字段开启
#    thinking:
#      type: enabled
#      budget_tokens: 8000
#
#  OpenAI o 系列：通过 reasoning_effort 控制
#    reasoning_effort: medium   # low / medium / high
# ─────────────────────────────────────────────────────────────────────

log_level: INFO   # DEBUG / INFO / WARNING / ERROR

active_model: deepseek-chat
review_model: deepseek-chat   # 技能复盘用模型；不填则复用 active_model

active_sandbox: local-dev

skills_dir: ../skills
output_dir: ../sandbox/output


# ── 聊天平台接入 ───────────────────────────────────────────────────────
# 飞书接入需同时在 .env 设置 FEISHU_ENABLED=true 及相关密钥
platforms:
  - name: feishu
    transport: websocket    # websocket（无需公网）或 webhook


# ── 技能库馆长 ─────────────────────────────────────────────────────────
curator:
  enabled: true
  interval_hours: 24          # 执行间隔（小时）
  stale_after_days: 30        # 超过此天数未使用视为过时
  min_use_count_to_protect: 3 # use_count 低于此值才进行归档检查


# ── 沙箱配置 ──────────────────────────────────────────────────────────
sandboxes:
  - name: local-dev           # 本地沙箱（开发推荐）
    provider: local
    workspace_dir: ./sandbox
    timeout: 120
    idle_timeout: 1800

  - name: aios-local          # AIO Sandbox 本地模式
    provider: aios
    image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox
    workspace_dir: /home/gem
    timeout: 60
    auto_start: true
    idle_timeout: 30

  # - name: cloud-daytona     # Daytona 云沙箱
  #   provider: daytona
  #   api_key: $DAYTONA_API_KEY
  #   api_url: https://app.daytona.io/api


# ── 外部知识来源 ───────────────────────────────────────────────────────
# 定期拉取文档写入 raw/，再经 ingest 编译进 wiki
knowledge_sources:
  - name: github-ai
    type: github
    schedule: "0 8 * * *"       # 每天早上 8 点
    token: $GITHUB_TOKEN         # 可选，有 token 速率限制更高（5000/h vs 60/h）
    repos:
      - langchain-ai/langchain
      - langchain-ai/langgraph
      - langchain-ai/langchain-community
      - anthropics/anthropic-sdk-python
      - openai/openai-python
      - microsoft/autogen
      - crewAIInc/crewAI
    fetch:
      readme: true               # 拉取 README
      releases: 3                # 最近 N 条 release notes

  # ── 飞书知识库（有飞书 wiki 时启用）──────────────────────────────
  # - name: feishu-wiki
  #   type: feishu_wiki
  #   space_id: "YOUR_SPACE_ID"  # GET /wiki/v2/spaces/ 查询
  #   app_id: $FEISHU_APP_ID     # 选填，默认读 .env FEISHU_APP_ID
  #   app_secret: $FEISHU_APP_SECRET
  #   schedule: "0 2 * * *"      # 每天凌晨 2 点
  #   page_limit: 50


# ── 用户画像 ──────────────────────────────────────────────────────────
# 每周自动汇总 Claude Code 会话，生成 wiki/user/profile.md
# 注入主 agent 系统提示词，实现 agent 个性化
activity_profile:
  enabled: true
  schedule: "0 9 * * 1"   # 每周一 09:00
  lookback_days: 7
  sources:
    - type: claude_code_logs


# ── 模型配置 ──────────────────────────────────────────────────────────
models:
  # ── DeepSeek ─────────────────────────────────────────────────────
  - name: deepseek-chat
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: deepseek-chat
    api_key: $DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    temperature: 1.0
    max_tokens: 4096
    max_retries: 2

  - name: deepseek-reasoner   # R1 推理模型，始终输出思考内容
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: deepseek-reasoner
    api_key: $DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    max_tokens: 8096
    max_retries: 2

  # ── OpenAI ────────────────────────────────────────────────────────
  - name: gpt-4o-mini
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: gpt-4o-mini
    api_key: $OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    temperature: 0.7
    max_tokens: 4096
    max_retries: 2

