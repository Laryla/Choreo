# Choreo 模型配置
# active_model: 指定默认使用哪个 name 的模型
# 也可通过环境变量 CHOREO_MODEL_NAME=xxx 运行时切换

active_model: deepseek-chat

models:
  - name: deepseek-chat
    use: langchain_openai:ChatOpenAI
    model: deepseek-chat
    api_key: sk-386b6ab4ce7146588bf69e4e70d2de99         # $ 开头表示从环境变量读取
    base_url: https://api.deepseek.com/v1
    temperature: 1.0
    max_tokens: 4096
    max_retries: 2
    
  - name: gpt-4o-mini-proxy
    use: langchain_openai:ChatOpenAI
    model: gpt-4o-mini
    api_key: sk-H2WnT74ShuiayQegw5gnTwOX0wYydb0DV4w3eRhc3IaTLPL5
    base_url: https://api.openai-proxy.org/v1
    temperature: 0.7
    max_tokens: 4096
    max_retries: 2
