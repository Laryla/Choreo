# Choreo 模型配置
# active_model: 指定默认使用哪个 name 的模型
# 也可通过环境变量 CHOREO_MODEL_NAME=xxx 运行时切换
#
# ── 思考内容（Thinking）说明 ──────────────────────────────────────────
# 不同提供商开启方式不同：
#
#  DeepSeek：模型级别区分，无需额外参数
#    deepseek-chat     → 无思考（通用对话）
#    deepseek-reasoner → 始终思考，reasoning_content 字段自动返回
#
#  Anthropic Claude：通过 thinking 字段开启，需设置 token budget
#    thinking:
#      type: enabled
#      budget_tokens: 8000    # 思考最多消耗的 token 数
#
#  OpenAI o 系列：通过 reasoning_effort 控制推理力度
#    reasoning_effort: medium  # low / medium / high
#
#  Google Gemini：通过 thinking_level 控制
#    thinking_level: medium    # minimal / low / medium / high
# ───────────────────────────────────────────────────────────────────

active_model: deepseek-chat

models:
  # ── DeepSeek ─────────────────────────────────────────────────────
  - name: deepseek-chat
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: deepseek-chat
    api_key: sk-386b6ab4ce7146588bf69e4e70d2de99
    base_url: https://api.deepseek.com/v1
    temperature: 1.0
    max_tokens: 4096
    max_retries: 2

  - name: deepseek-reasoner            # R1 推理模型：始终输出思考内容，多轮需回传 reasoning_content
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: deepseek-reasoner
    api_key: sk-386b6ab4ce7146588bf69e4e70d2de99
    base_url: https://api.deepseek.com/v1
    max_tokens: 8096
    max_retries: 2

  # ── OpenAI Proxy ──────────────────────────────────────────────────
  - name: gpt-4o-mini-proxy
    use: choreo.models.patched_openai:PatchedChatOpenAI
    model: gpt-4o-mini
    api_key: sk-H2WnT74ShuiayQegw5gnTwOX0wYydb0DV4w3eRhc3IaTLPL5
    base_url: https://api.openai-proxy.org/v1
    temperature: 0.7
    max_tokens: 4096
    max_retries: 2

  # ── Anthropic Claude（需安装 langchain-anthropic）─────────────────
  # - name: claude-sonnet
  #   use: langchain_anthropic:ChatAnthropic
  #   model: claude-sonnet-4-6
